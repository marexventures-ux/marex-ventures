<!-- Consultation Form -->
  <section class="container section reveal" style="padding-top: 150px; padding-bottom: 4rem;">
    <div class="contact-form-section floating-card" style="border-top: 4px solid var(--accent-navy);">
      <h1 style="margin-bottom: 1rem;">Let's <span class="text-gradient">Scale Your Business</span></h1>
      <p style="margin-bottom: 3rem; color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin-left: auto; margin-right: auto;">
        Fill out the form below to book a consultation. Our team will review your current systems and design a custom software or automation strategy tailored to your exact workflows.
      </p>
      
      <form name="consultation" method="POST" data-netlify="true" action="/index.html">
        <div class="form-group">
          <label>Name</label>
          <input type="text" name="name" class="form-control" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
          <label>Business Type</label>
          <input type="text" name="business_type" class="form-control" required placeholder="e.g., Marketing Agency, E-Commerce, SaaS">
        </div>
        
        <div class="form-group">
          <label>Service of Interest</label>
          <select name="service_interest" class="form-control" required>
            <option value="">Select a service...</option>
            <option value="automation">Automation Systems</option>
            <option value="custom_tools">Custom Tools</option>
            <option value="training">Trainings & Workshops</option>
            <option value="other">Not Sure / Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Project Details (Optional)</label>
          <textarea name="project_details" class="form-control" rows="5" placeholder="Describe your project, workflows, or what you're looking to achieve..."></textarea>
        </div>
        
        <div class="form-group">
          <label>Budget (Optional)</label>
          <select name="budget" class="form-control">
            <option value="">Select your budget range...</option>
            <option value="under_1m">Under ₦1,000,000</option>
            <option value="1m_to_5m">₦1,000,000 - ₦5,000,000</option>
            <option value="5m_to_10m">₦5,000,000 - ₦10,000,000</option>
            <option value="10m_plus">₦10,000,000+</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 8px; font-size: 1.1rem; padding: 1rem; margin-top: 1.5rem;">Book Consultation</button>
      </form>
    </div>
  </section>
